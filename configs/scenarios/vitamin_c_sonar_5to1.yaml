# Phase 4.6 — Sonar-matched volume ratio for vitamin C.
#
# Scales the pot down to V_water / V_carrot ~= 5 (the ratio in Sonar et al.
# 2018, PMC6049644, which reports R(12 min) = 55.33 % on diced carrot). The
# default geometry is ~104:1 water:carrot, so the equilibrium leach cap is
# ~99 % of initial mass; at 5:1 the equilibrium cap drops to ~83 %, which
# closes most of the over-leach gap against Sonar. Everything else is
# identical to vitamin_c_25mm.yaml — single-variable A/B comparison.
#
# Geometry computation (25 mm x 50 mm carrot, V_carrot = 24.5 mL):
#   pot inner radius  = 0.055/2 - 0.003     = 0.0245 m
#   water height       = (0.090 - 0.005)*0.75 = 0.06375 m
#   V_water           = pi * 0.0245^2 * 0.06375 = 1.20e-4 m^3 = 120 mL
#   ratio             = 120 / 24.5          = 4.9 : 1 ✓
#
# Geometry validator constraints (config.py _carrot_fits_inside_pot):
#   carrot radius 12.5 mm < inner radius 24.5 mm  ✓
#   carrot top at z = 15 + 50 = 65 mm
#   water top at  z = 5 + 63.75 = 68.75 mm  (carrot fully submerged) ✓
pot:
  diameter_m: 0.055                # 5.5 cm outer
  height_m: 0.090                  # 9 cm tall
  wall_thickness_m: 0.003
  base_thickness_m: 0.005
  material: steel_304

water:
  fill_fraction: 0.76
  initial_temp_c: 20.0

carrot:
  diameter_m: 0.025
  length_m: 0.05
  position: [0.0, 0.0, 0.015]      # bottom at z=15 mm so top (65 mm) < water top (68.75 mm)
  initial_beta_carotene_mg_per_100g: 8.3

heating:
  base_heat_flux_w_per_m2: 30000.0
  ambient_temp_c: 22.0

grid:
  dx_m: 0.002                       # dev tier; nx~28, ny~28, nz~45, ~35 k cells
  carrot_mesh_resolution: 40

solver:
  cfl_safety_factor: 0.4
  max_dt_s: 0.1
  pressure_tol: 1.0e-5
  pressure_max_iter: 200
  diffusion_tol: 1.0e-4
  diffusion_max_iter: 50
  h_conv_outer_w_per_m2_k: 10.0

boiling:
  enabled: false
  dT_onb_k: 5.0
  contact_angle_rad: 1.0
  max_bubbles: 100000
  initial_bubble_radius_m: 1.0e-5
  nucleation_probability_per_step: 0.1
  C_sf_rohsenow: 0.013
  Pr_n_rohsenow: 1.0

# Same re-anchored vitamin C block as vitamin_c_25mm.yaml. The ONLY physical
# difference from that scenario is the pot geometry above.
nutrient:
  enabled: false
  E_a_kJ_per_mol: 74.0
  k0_per_s: 1.1e7
  D_eff_m2_per_s: 5.0e-10
  K_partition: 1.0
  C0_mg_per_kg: 59.0
  C_water_sat_mg_per_kg: 1.0e6

total_time_s: 720.0                 # 12 min — Sonar's cook time
output_every_s: 0.1
