# Phase 4.6 — Vieira-faithful vitamin C calibration.
#
# Identical to vitamin_c_25mm.yaml in every respect EXCEPT k0_per_s, which is
# set to 4.70e7 so that k(100 C) = 2.06e-3 /s — the rate obtained by Arrhenius-
# extrapolating Vieira, Teixeira & Silva (2000)'s raw k1(80 C) = 0.032/min
# with E_a = 74 kJ/mol:
#
#     k(100)/k(80) = exp[E_a/R * (1/353 - 1/373)]      = exp(1.353) = 3.87
#     k(100)      = 5.33e-4 * 3.87                     = 2.06e-3 /s
#     k0           = 2.06e-3 / exp(-E_a/(R*373.15))    = 4.70e7
#
# Vieira's matrix was acidic sugared cupuacu nectar, not plain boiling water,
# so this rate is known a priori to over-predict thermal loss (expected
# thermal-only retention ~29 % at 600 s vs the plain-water blanching
# literature's ~75 %). The value of this scenario is *showing both* --
# vitamin_c_25mm.yaml (re-anchored, 75 %-target) and this file (Vieira-
# faithful, 29 %-target) -- so a reviewer can judge whether the re-anchoring
# in vitamin_c_25mm.yaml was justified. See benchmarks/phase4_retention.md
# "Vitamin C extension" for full derivation.
pot:
  diameter_m: 0.20
  height_m: 0.12
  wall_thickness_m: 0.003
  base_thickness_m: 0.005
  material: steel_304

water:
  fill_fraction: 0.75
  initial_temp_c: 20.0

carrot:
  diameter_m: 0.025
  length_m: 0.05
  position: [0.0, 0.0, 0.03]
  initial_beta_carotene_mg_per_100g: 8.3

heating:
  base_heat_flux_w_per_m2: 30000.0
  ambient_temp_c: 22.0

grid:
  dx_m: 0.001
  carrot_mesh_resolution: 40

solver:
  cfl_safety_factor: 0.4
  max_dt_s: 0.1
  pressure_tol: 1.0e-5
  pressure_max_iter: 200
  diffusion_tol: 1.0e-4
  diffusion_max_iter: 50
  h_conv_outer_w_per_m2_k: 10.0

boiling:
  enabled: false
  dT_onb_k: 5.0
  contact_angle_rad: 1.0
  max_bubbles: 100000
  initial_bubble_radius_m: 1.0e-5
  nucleation_probability_per_step: 0.1
  C_sf_rohsenow: 0.013
  Pr_n_rohsenow: 1.0

nutrient:
  enabled: false
  E_a_kJ_per_mol: 74.0
  k0_per_s: 4.70e7                 # Vieira-faithful — see header.
  D_eff_m2_per_s: 5.0e-10
  K_partition: 1.0
  C0_mg_per_kg: 59.0
  C_water_sat_mg_per_kg: 1.0e6

total_time_s: 600.0
output_every_s: 0.1
