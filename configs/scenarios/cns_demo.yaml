# 2026 CNS conference demo: cold-start beta-carotene retention in a 20 cm
# steel-304 saucepan on a 60 kW/m^2 burner (~1.88 kW). Forks default.yaml,
# only `heating.base_heat_flux_w_per_m2` and `nutrient.enabled` differ.
#
# Drives run_retention.py for a single-run retention vs time / temperature
# story; the script forces boiling=on and nutrient=on internally, but the
# YAML mirrors that for clarity.
pot:
  diameter_m: 0.20
  height_m: 0.12
  wall_thickness_m: 0.003
  base_thickness_m: 0.005
  material: steel_304

water:
  fill_fraction: 0.75
  initial_temp_c: 20.0

carrot:
  diameter_m: 0.025
  length_m: 0.05
  position: [0.0, 0.0, 0.03]
  initial_beta_carotene_mg_per_100g: 8.3

heating:
  base_heat_flux_w_per_m2: 60000.0  # ~1.88 kW on a 20 cm base -- mid-high residential burner
  ambient_temp_c: 22.0

grid:
  dx_m: 0.001
  carrot_mesh_resolution: 40

solver:
  cfl_safety_factor: 0.4
  max_dt_s: 0.1
  pressure_tol: 1.0e-5
  pressure_max_iter: 200
  diffusion_tol: 1.0e-4
  diffusion_max_iter: 50
  h_conv_outer_w_per_m2_k: 10.0

boiling:
  enabled: true
  dT_onb_k: 5.0
  contact_angle_rad: 1.0
  max_bubbles: 100000
  initial_bubble_radius_m: 1.0e-5
  nucleation_probability_per_step: 0.1
  C_sf_rohsenow: 0.013
  Pr_n_rohsenow: 1.0

nutrient:
  enabled: true
  E_a_kJ_per_mol: 70.0
  k0_per_s: 2.63e6
  D_eff_m2_per_s: 2.0e-10
  K_partition: 1.0e-5
  C0_mg_per_kg: 83.0
  C_water_sat_mg_per_kg: 6.0e-3

total_time_s: 900.0
output_every_s: 0.1
