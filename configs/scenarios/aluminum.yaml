# Aluminum pot, real-world household cooking. Material variant of default.yaml.
# Same geometry, ambient, fill, and burner power; only the pot material differs.
# Aluminum's high k (~237 vs steel's 15 W/m-K) gives a more isothermal wall and
# slightly faster boil-up than the steel default.
#
# This config supersedes the Phase-2 sub-saturation ONB validation case
# (q=30 kW/m^2, boiling off). Phase-2 benchmark numbers are obsolete after the
# realworld-refresh -- see benchmarks/phase2_heating.md.
pot:
  diameter_m: 0.20
  height_m: 0.12
  wall_thickness_m: 0.003
  base_thickness_m: 0.005
  material: aluminum

water:
  fill_fraction: 0.75
  initial_temp_c: 20.0

carrot:
  diameter_m: 0.025
  length_m: 0.05
  position: [0.0, 0.0, 0.03]
  initial_beta_carotene_mg_per_100g: 8.3

heating:
  base_heat_flux_w_per_m2: 80000.0  # ~2.5 kW residential boil setting
  ambient_temp_c: 22.0

grid:
  dx_m: 0.001
  carrot_mesh_resolution: 40

solver:
  cfl_safety_factor: 0.4
  max_dt_s: 0.1
  pressure_tol: 1.0e-5
  pressure_max_iter: 200
  diffusion_tol: 1.0e-4
  diffusion_max_iter: 50
  h_conv_outer_w_per_m2_k: 10.0

boiling:
  enabled: true                     # nucleate boiling on -- real cooking
  dT_onb_k: 5.0
  contact_angle_rad: 1.0
  max_bubbles: 100000
  initial_bubble_radius_m: 1.0e-5
  nucleation_probability_per_step: 0.1
  C_sf_rohsenow: 0.013
  Pr_n_rohsenow: 1.0

nutrient:
  enabled: false
  E_a_kJ_per_mol: 70.0
  k0_per_s: 2.63e6
  D_eff_m2_per_s: 2.0e-10
  K_partition: 1.0e-5               # bare beta-carotene in pure water
  C0_mg_per_kg: 83.0
  C_water_sat_mg_per_kg: 6.0e-3     # aqueous solubility at ~100 C

total_time_s: 900.0  # 15 min: boil-up + steady boil
output_every_s: 0.1
