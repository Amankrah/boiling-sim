# Supervisord config for the unified RunPod image.
#
# Runs three processes inside the pod container:
#
#   1. ws-server          — Rust Axum relay on :8080 + TCP ingest :8765 / control :8766
#   2. nginx              — :80, proxies /stream + /api to ws-server
#   3. dashboard_solver   — Python producer. Depends on ws-server being up; we
#                           wait for the ingest port via a tiny shell loop in
#                           the command.
#
# Start order is driven by `priority`: lower = starts first.
# All three auto-restart so a ws-server panic or a solver OOM doesn't kill
# the whole pod — supervisord brings the failing process back up.

[program:ws-server]
command=/usr/local/bin/ws-server
priority=10
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=RUST_LOG="info"

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=20
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:dashboard_solver]
# Wait up to 30 s for ws-server's ingest port 8765 to be listening, then
# launch the precheck + producer. Without this the solver races ws-server
# on cold start and hits "Connection refused" before supervisord's 1-sec
# backoff reconnects it.
command=/bin/bash -c "for i in $(seq 1 30); do (</dev/tcp/127.0.0.1/8765) 2>/dev/null && break; sleep 1; done; exec /usr/local/bin/dashboard_precheck"
directory=/app
priority=30
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
