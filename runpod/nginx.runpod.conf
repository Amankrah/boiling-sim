# nginx config for the unified RunPod image.
#
# Identical intent to web/nginx.conf, but proxies to 127.0.0.1:8080 instead
# of the compose-network hostname `ws-server:8080`. Lives in the single
# container with nginx + ws-server + solver, so all traffic is loopback.

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: every non-asset URL rewrites to index.html so share
    # links with query strings hit the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Run summaries / CSV / HDF5 — same-origin fetches from the Results page.
    location ^~ /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket upgrade to the loopback ws-server.
    location /stream {
        proxy_pass http://127.0.0.1:8080/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
