# nginx config for the Phase 6 dashboard container.
#
#   /              -> Vite production build (static files)
#   /stream        -> proxied to ws-server:8080/stream as a WebSocket upgrade
#   /api           -> proxied to ws-server:8080 (run artefacts for Results tab)
#   /health        -> proxied to ws-server:8080/health for liveness checks

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: every non-asset URL rewrites to index.html so share
    # links with query strings hit the React router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Run summaries / CSV / HDF5 — same-origin fetches from the Results page.
    location ^~ /api {
        proxy_pass http://ws-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # WebSocket upgrade to the ws-server container on the docker network.
    location /stream {
        proxy_pass http://ws-server:8080/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;   # don't kill idle WebSocket connections
        proxy_send_timeout 86400s;
    }

    location /health {
        proxy_pass http://ws-server:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
